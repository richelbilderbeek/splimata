on:
  push:
    paths:
      - 'docs/**'
      - .github/workflows/check_links.yaml
      - mlc_config.json
  pull_request:
    paths:
      - 'docs/**'
      - .github/workflows/check_links.yaml
      - mlc_config.json
  schedule:
  - cron: "0 0 12 * *"

name: check-links

jobs:
  check-links:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: empty files that need no checking
        run: |
          echo "empty" > inst/extdata/example_1.md
          echo "empty" > inst/extdata/example_1_en.md
          echo "empty" > inst/extdata/example_1_sv.md
          echo "empty" > inst/extdata/example_2.md

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: 'mlc_config.json'
